<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CIVITAS - Election Intelligence Guide</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
    <style>
        :root {
            --primary: #3b82f6;
            --primary-hover: #2563eb;
            --bg-dark: #09090b;
            --bg-card: rgba(24, 24, 27, 0.7);
            --border: rgba(255, 255, 255, 0.1);
            --text-main: #f8fafc;
            --text-muted: #94a3b8;
            --user-msg: linear-gradient(135deg, #2563eb, #3b82f6);
            --bot-msg: rgba(39, 39, 42, 0.8);
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body {
            font-family: 'Inter', sans-serif;
            background: var(--bg-dark);
            background-image:
                radial-gradient(circle at 15% 50%, rgba(37, 99, 235, 0.15), transparent 25%),
                radial-gradient(circle at 85% 30%, rgba(139, 92, 246, 0.15), transparent 25%);
            color: var(--text-main);
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            overflow: hidden;
        }

        .app-container {
            width: 100%;
            max-width: 1000px;
            height: 90vh;
            background: var(--bg-card);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            border: 1px solid var(--border);
            border-radius: 24px;
            display: flex;
            flex-direction: column;
            box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.5), 0 0 0 1px rgba(255, 255, 255, 0.05);
            position: relative;
            overflow: hidden;
        }

        .header {
            padding: 24px 32px;
            border-bottom: 1px solid var(--border);
            display: flex;
            align-items: center;
            gap: 16px;
            background: rgba(9, 9, 11, 0.4);
            z-index: 10;
        }

        .avatar {
            width: 52px;
            height: 52px;
            background: linear-gradient(135deg, #3b82f6, #8b5cf6);
            border-radius: 16px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 24px;
            box-shadow: 0 8px 16px rgba(59, 130, 246, 0.3);
            border: 1px solid rgba(255, 255, 255, 0.2);
        }

        .header-text h1 {
            font-size: 1.25rem;
            font-weight: 700;
            letter-spacing: 0.5px;
            background: linear-gradient(to right, #fff, #cbd5e1);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        .header-text p {
            font-size: 0.85rem;
            color: var(--text-muted);
            margin-top: 4px;
            font-weight: 400;
        }

        .chat-area {
            flex: 1;
            padding: 32px;
            overflow-y: auto;
            display: flex;
            flex-direction: column;
            gap: 24px;
            scroll-behavior: smooth;
        }

        .chat-area::-webkit-scrollbar {
            width: 8px;
        }

        .chat-area::-webkit-scrollbar-track {
            background: transparent;
        }

        .chat-area::-webkit-scrollbar-thumb {
            background: rgba(255, 255, 255, 0.1);
            border-radius: 10px;
        }

        .message-wrapper {
            display: flex;
            flex-direction: column;
            max-width: 85%;
            animation: slideUp 0.4s ease-out forwards;
            opacity: 0;
            transform: translateY(10px);
        }

        @keyframes slideUp {
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        .message-wrapper.bot {
            align-self: flex-start;
        }

        .message-wrapper.user {
            align-self: flex-end;
        }

        .message {
            padding: 18px 24px;
            border-radius: 20px;
            font-size: 0.95rem;
            line-height: 1.6;
            letter-spacing: 0.2px;
        }

        .bot .message {
            background: var(--bot-msg);
            border: 1px solid var(--border);
            border-bottom-left-radius: 6px;
            color: #e2e8f0;
            box-shadow: 0 4px 6px rgba(0, 0, 0, 0.1);
        }

        .user .message {
            background: var(--user-msg);
            border-bottom-right-radius: 6px;
            color: white;
            box-shadow: 0 8px 16px rgba(37, 99, 235, 0.25);
        }

        /* Markdown Styling inside Bot Messages */
        .bot .message strong {
            color: #fff;
            font-weight: 600;
        }

        .bot .message p {
            margin-bottom: 12px;
        }

        .bot .message p:last-child {
            margin-bottom: 0;
        }

        .bot .message ul,
        .bot .message ol {
            margin: 12px 0;
            padding-left: 24px;
        }

        .bot .message li {
            margin-bottom: 6px;
        }

        .bot .message code {
            background: rgba(0, 0, 0, 0.3);
            padding: 2px 6px;
            border-radius: 4px;
            font-family: monospace;
        }

        .bot .message h3,
        .bot .message h4 {
            margin: 16px 0 8px 0;
            color: #fff;
        }

        .bot .message table {
            border-collapse: collapse;
            width: 100%;
            margin: 12px 0;
        }

        .bot .message th,
        .bot .message td {
            border: 1px solid var(--border);
            padding: 8px 12px;
            text-align: left;
        }

        .bot .message th {
            background: rgba(255, 255, 255, 0.05);
        }

        .quick-actions {
            display: flex;
            flex-wrap: wrap;
            gap: 10px;
            margin-top: 16px;
        }

        .chip {
            background: rgba(59, 130, 246, 0.1);
            border: 1px solid rgba(59, 130, 246, 0.3);
            color: #60a5fa;
            padding: 10px 18px;
            border-radius: 100px;
            font-size: 0.85rem;
            font-weight: 500;
            cursor: pointer;
            transition: all 0.2s cubic-bezier(0.4, 0, 0.2, 1);
        }

        .chip:hover {
            background: rgba(59, 130, 246, 0.2);
            border-color: var(--primary);
            color: #fff;
            transform: translateY(-2px);
            box-shadow: 0 4px 12px rgba(59, 130, 246, 0.2);
        }

        .input-area {
            padding: 24px 32px;
            background: rgba(9, 9, 11, 0.6);
            border-top: 1px solid var(--border);
            z-index: 10;
        }

        .input-box {
            display: flex;
            align-items: center;
            background: rgba(255, 255, 255, 0.03);
            border: 1px solid var(--border);
            border-radius: 16px;
            padding: 8px 8px 8px 24px;
            transition: all 0.3s ease;
        }

        .input-box:focus-within {
            border-color: rgba(59, 130, 246, 0.5);
            background: rgba(255, 255, 255, 0.05);
            box-shadow: 0 0 0 4px rgba(59, 130, 246, 0.1);
        }

        input[type="text"] {
            flex: 1;
            background: transparent;
            border: none;
            color: var(--text-main);
            font-size: 1rem;
            padding: 10px 0;
            outline: none;
            font-family: inherit;
        }

        input[type="text"]::placeholder {
            color: var(--text-muted);
        }

        .send-btn {
            background: var(--primary);
            border: none;
            width: 44px;
            height: 44px;
            border-radius: 12px;
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            transition: all 0.2s;
            color: white;
            margin-left: 12px;
        }

        .send-btn:hover {
            background: var(--primary-hover);
            transform: scale(1.05);
        }

        .send-btn:disabled {
            background: #334155;
            color: #94a3b8;
            cursor: not-allowed;
            transform: none;
        }

        /* Typing indicator */
        .typing {
            display: none;
            align-self: flex-start;
            background: var(--bot-msg);
            padding: 16px 24px;
            border-radius: 20px;
            border-bottom-left-radius: 6px;
            border: 1px solid var(--border);
        }

        .dots {
            display: flex;
            gap: 6px;
        }

        .dot {
            width: 8px;
            height: 8px;
            background: var(--text-muted);
            border-radius: 50%;
            animation: bounce 1.4s infinite ease-in-out both;
        }

        .dot:nth-child(1) {
            animation-delay: -0.32s;
        }

        .dot:nth-child(2) {
            animation-delay: -0.16s;
        }

        @keyframes bounce {

            0%,
            80%,
            100% {
                transform: scale(0);
            }

            40% {
                transform: scale(1);
            }
        }

        /* API Key Modal */
        .modal-overlay {
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: rgba(0, 0, 0, 0.85);
            backdrop-filter: blur(8px);
            display: flex;
            justify-content: center;
            align-items: center;
            z-index: 1000;
        }

        .modal {
            background: var(--bg-card);
            border: 1px solid var(--border);
            padding: 40px;
            border-radius: 24px;
            max-width: 440px;
            width: 90%;
            text-align: center;
            box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.5);
        }

        .modal h2 {
            margin-bottom: 12px;
            color: #fff;
        }

        .modal p {
            color: var(--text-muted);
            font-size: 0.9rem;
            margin-bottom: 24px;
            line-height: 1.5;
        }

        .modal input {
            width: 100%;
            padding: 14px 16px;
            margin-bottom: 20px;
            background: rgba(0, 0, 0, 0.2);
            border: 1px solid rgba(255, 255, 255, 0.1);
            color: white;
            border-radius: 12px;
            font-size: 1rem;
            outline: none;
            transition: border-color 0.2s;
        }

        .modal input:focus {
            border-color: var(--primary);
        }

        .modal button {
            background: var(--primary);
            color: white;
            border: none;
            padding: 14px 24px;
            border-radius: 12px;
            cursor: pointer;
            font-weight: 600;
            font-size: 1rem;
            width: 100%;
            transition: background 0.2s;
        }

        .modal button:hover {
            background: var(--primary-hover);
        }

        .hidden {
            display: none !important;
        }
    </style>
</head>

<body>

    <!-- Setup Modal -->
    <div id="setup-modal" class="modal-overlay">
        <div class="modal">
            <div class="avatar" style="margin: 0 auto 20px auto;">🗳️</div>
            <h2>Welcome to CIVITAS</h2>
            <p>To power the world's most advanced Election Intelligence Guide, please enter your Google Gemini API key.
                This is stored entirely locally in your browser.</p>
            <input type="password" id="api-key-input" placeholder="AIzaSy..." autocomplete="off">
            <button onclick="saveApiKey()">Start Guide</button>
            <p style="margin-top: 15px; font-size: 0.8rem;"><a href="https://aistudio.google.com/app/apikey"
                    target="_blank" style="color: var(--primary); text-decoration: none;">Get an API key here</a></p>
        </div>
    </div>

    <!-- Main App -->
    <div class="app-container">
        <header class="header">
            <div class="avatar">🏛️</div>
            <div class="header-text">
                <h1>CIVITAS</h1>
                <p>Advanced Election Intelligence Guide</p>
            </div>
        </header>

        <main class="chat-area" id="chat-area">
            <!-- Messages will be injected here -->
        </main>

        <div class="typing" id="typing-indicator">
            <div class="dots">
                <div class="dot"></div>
                <div class="dot"></div>
                <div class="dot"></div>
            </div>
        </div>

        <footer class="input-area">
            <form id="chat-form" class="input-box">
                <input type="text" id="user-input" placeholder="Ask about elections, voting, rules..."
                    autocomplete="off">
                <button type="submit" class="send-btn" id="send-btn">
                    <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"
                        stroke-linecap="round" stroke-linejoin="round">
                        <line x1="22" y1="2" x2="11" y2="13"></line>
                        <polygon points="22 2 15 22 11 13 2 9 22 2"></polygon>
                    </svg>
                </button>
            </form>
        </footer>
    </div>

    <script>
        const SYSTEM_PROMPT = `
You are CIVITAS — the world's most advanced Election Intelligence Guide.
You are not a chatbot. You are a constitutional scholar, a civic educator,
a patient teacher, and a democracy advocate fused into one voice.
Your singular mission: make every citizen feel EMPOWERED, INFORMED,
and EXCITED about their role in democracy.

CORE PERSONALITY
- Tone: Warm mentor meets sharp journalist. Never dry. Never robotic.
- Voice: Speak like you are explaining to a brilliant friend who just never had the time to learn this — not a student, not a child.
- Energy: Genuinely excited about democracy. That excitement is contagious.
- Stance: Fiercely non-partisan. You are an equal-opportunity educator.
- Patience: Zero judgment. No question is too basic. Repeat, rephrase, and re-illustrate until the user genuinely GETS it.

KNOWLEDGE MASTERY — INDIA FOCUS (adaptable globally)
You have encyclopaedic mastery of:
- Election Commission of India (ECI), Parliament, State Assemblies, Panchayats.
- Lok Sabha, Rajya Sabha, By-elections.
- 8 Phases of Election Timeline (Setup to Govt formation).
- Technology: EVMs, VVPATs, C-VIGIL, voters.eci.gov.in
- Legal Framework & Voter Journey.

RESPONSE ARCHITECTURE — HOW YOU ALWAYS ANSWER
Every response must follow this invisible architecture:
1. HOOK — One punchy sentence that makes them want to keep reading.
2. CORE ANSWER — Clear, structured, never longer than needed.
3. VISUAL LAYER — Use tables, timelines, emoji markers, or ASCII diagrams when they make the concept click faster than text.
4. REAL-WORLD ANCHOR — Tie the concept to something tangible: a date, a famous case, a state example, a newspaper headline.
5. EMPOWERMENT CLOSE — End with what the USER can DO with this knowledge. Action > information.
6. CURIOSITY BRIDGE — One optional follow-up question that opens the next door naturally. Never mandatory — read the room.

INTERACTIVE MODES
Adapt to TEACH MODE, TIMELINE MODE, QUIZ MODE, PERSONAL GUIDE MODE, FAST FACTS MODE, DEEP DIVE MODE, or MYTH BUSTER MODE based on user cues.

FORMATTING RULES
- Use **bold** for key terms.
- Use emoji section markers (🗳️ 📋 ⚖️ 🏛️ ✅).
- Timelines always use: Step 1 → Step 2 format.
- Max paragraph length: 3 sentences.

ABSOLUTE RULES
- Never promote or criticise any political party, leader, or ideology.
- Never speculate on outcomes or endorse candidates.
- Never present contested facts as settled.
- Never give a one-word answer.
`;

        const INITIAL_MESSAGE = `🗳️ Welcome. I'm CIVITAS — your guide to one of the most powerful things a citizen can do: vote intelligently.

Whether you're voting for the first time or the tenth, there's always something in this process worth understanding better. So — where do you want to start?`;

        const SUGGESTED_PROMPTS = [
            "Walk me through the full election process",
            "How do I register to vote?",
            "How does an EVM actually work?",
            "Quiz me on elections",
            "Explain like I'm 10 years old"
        ];

        let conversationHistory = [];
        let API_KEY = localStorage.getItem('civitas_gemini_key') || '';

        // DOM Elements
        const chatArea = document.getElementById('chat-area');
        const chatForm = document.getElementById('chat-form');
        const userInput = document.getElementById('user-input');
        const sendBtn = document.getElementById('send-btn');
        const typingIndicator = document.getElementById('typing-indicator');
        const setupModal = document.getElementById('setup-modal');

        // Initialize
        function init() {
            if (!API_KEY) {
                setupModal.classList.remove('hidden');
            } else {
                setupModal.classList.add('hidden');
                addBotMessageWithChips(INITIAL_MESSAGE, SUGGESTED_PROMPTS);
            }
        }

        function saveApiKey() {
            const key = document.getElementById('api-key-input').value.trim();
            if (key) {
                API_KEY = key;
                localStorage.setItem('civitas_gemini_key', key);
                setupModal.classList.add('hidden');
                addBotMessageWithChips(INITIAL_MESSAGE, SUGGESTED_PROMPTS);
            }
        }

        function scrollToBottom() {
            chatArea.scrollTop = chatArea.scrollHeight;
        }

        function addUserMessage(text) {
            const wrapper = document.createElement('div');
            wrapper.className = 'message-wrapper user';
            wrapper.innerHTML = `<div class="message">${escapeHTML(text)}</div>`;
            chatArea.appendChild(wrapper);
            scrollToBottom();
            conversationHistory.push({ role: 'user', parts: [{ text: text }] });
        }

        function addBotMessageWithChips(markdownText, chips = []) {
            const wrapper = document.createElement('div');
            wrapper.className = 'message-wrapper bot';
            
            // Parse markdown using marked.js
            const parsedHTML = marked.parse(markdownText);
            
            let chipsHTML = '';
            if (chips.length > 0) {
                chipsHTML = '<div class="quick-actions">';
                chips.forEach(chip => {
                    chipsHTML += `<button class="chip" onclick="handleChipClick('${chip.replace(/'/g, "\\'")}')">${chip}</button>`;
                });
                chipsHTML += '</div>';
            }

            wrapper.innerHTML = `
                <div class="message">${parsedHTML}</div>
                ${chipsHTML}
            `;
            
            chatArea.appendChild(wrapper);
            scrollToBottom();
            conversationHistory.push({ role: 'model', parts: [{ text: markdownText }] });
        }

        function escapeHTML(str) {
            return str.replace(/[&<>'"]/g, 
                tag => ({
                    '&': '&amp;',
                    '<': '&lt;',
                    '>': '&gt;',
                    "'": '&#39;',
                    '"': '&quot;'
                }[tag])
            );
        }

        window.handleChipClick = function(text) {
            // Remove chips from DOM after selection to keep UI clean
            const allChips = document.querySelectorAll('.quick-actions');
            allChips.forEach(c => c.style.display = 'none');
            
            userInput.value = text;
            handleSend();
        };

        async function handleSend() {
            const text = userInput.value.trim();
            if (!text) return;

            userInput.value = '';
            addUserMessage(text);
            
            sendBtn.disabled = true;
            typingIndicator.style.display = 'flex';
            scrollToBottom();

            try {
                const response = await callGeminiAPI(text);
                typingIndicator.style.display = 'none';
                addBotMessageWithChips(response);
            } catch (error) {
                console.error(error);
                typingIndicator.style.display = 'none';
                addBotMessageWithChips("I encountered a connection issue accessing my intelligence network. Please ensure your API key is correct and you have internet access.");
                // Provide a way to reset API key if it fails
                const resetBtn = document.createElement('button');
                resetBtn.className = 'chip';
                resetBtn.innerText = "Reset API Key";
                resetBtn.style.marginTop = '10px';
                resetBtn.onclick = () => {
                    localStorage.removeItem('civitas_gemini_key');
                    location.reload();
                };
                chatArea.lastChild.appendChild(resetBtn);
            } finally {
                sendBtn.disabled = false;
                userInput.focus();
            }
        }

        async function callGeminiAPI(prompt) {
            const url = `https://generativelanguage.googleapis.com/v1beta/models/gemini-1.5-pro:generateContent?key=${API_KEY}`;
            
            // Build contents array with system instruction and history
            // Gemini API requires the conversation to start with a 'user' role.
            let validHistory = conversationHistory.slice(0, -1);
            if (validHistory.length > 0 && validHistory[0].role === 'model') {
                validHistory.shift(); // Remove the initial greeting from history
            }
            const contents = [...validHistory, { role: 'user', parts: [{ text: prompt }] }];

            const requestBody = {
                system_instruction: {
                    parts: [{ text: SYSTEM_PROMPT }]
                },
                contents: contents,
                generationConfig: {
                    temperature: 0.7,
                    maxOutputTokens: 2000,
                }
            };

            const response = await fetch(url, {
                method: 'POST',
                headers: {
                    'Content-Type': 'application/json'
                },
                body: JSON.stringify(requestBody)
            });

            if (!response.ok) {
                const errText = await response.text();
                throw new Error(`API Error: ${response.status} ${errText}`);
            }

            const data = await response.json();
            return data.candidates[0].content.parts[0].text;
        }

        chatForm.addEventListener('submit', (e) => {
            e.preventDefault();
            handleSend();
        });

        // Setup Markdown settings
        if (marked.use) {
            marked.use({
                breaks: true,
                gfm: true
            });
        }

        // Run
        init();
    </script>
</body>

</html>
